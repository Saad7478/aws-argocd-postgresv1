# -------------------------------------------------------------
# 1.  Configuration des certificats K3s (TLS-SAN avec l'IP publique)
# -------------------------------------------------------------
- name: Ensure K3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0755'

- name: Configure TLS-SAN with Public IP in K3s configuration
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    content: |
      tls-san:
        - "{{ ansible_host }}"
    mode: '0644'
  register: k3s_config

- name: Restart K3s to regenerate certificates if config changed
  ansible.builtin.systemd:
    name: k3s
    state: restarted
  when: k3s_config.changed

- name: Wait for K3s API to be ready
  ansible.builtin.command: /usr/local/bin/kubectl cluster-info
  register: k3s_check
  until: k3s_check.rc == 0
  retries: 10
  delay: 5

# -------------------------------------------------------------
# 2. Installation d'ArgoCD
# -------------------------------------------------------------
- name: Create argocd namespace
  ansible.builtin.shell: |
    /usr/local/bin/kubectl create namespace argocd \
    --dry-run=client -o yaml | /usr/local/bin/kubectl apply -f -

- name: Install ArgoCD via official manifests
  ansible.builtin.shell: |
    /usr/local/bin/kubectl apply -n argocd \
    --server-side \
    --force-conflicts \
    -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

- name: Wait for ArgoCD server deployment rollout
  ansible.builtin.shell: |
    /usr/local/bin/kubectl rollout status deployment argocd-server -n argocd --timeout=300s

# -------------------------------------------------------------
# 3. Configuration du NodePort 30443 (Forwarding de port permanent)
# -------------------------------------------------------------
- name: Expose ArgoCD Server via NodePort on port 30443
  ansible.builtin.shell: |
    /usr/local/bin/kubectl patch svc argocd-server -n argocd \
    -p '{"spec": {"type": "NodePort", "ports": [{"name": "https", "port": 443, "nodePort": 30443}]}}'

# -------------------------------------------------------------
# 4. Optimisation des ressources pour l'instance K3s (Scale down)
# -------------------------------------------------------------
- name: Scale down ArgoCD unused components to save RAM
  ansible.builtin.shell: "/usr/local/bin/kubectl scale deployment {{ item }} -n argocd --replicas=0"
  loop:
    - argocd-dex-server
    - argocd-notifications-controller
    - argocd-applicationset-controller

- name: Check available memory on the K3s node
  ansible.builtin.shell: free -h
  register: memory_output

- name: Show remaining memory
  ansible.builtin.debug:
    var: memory_output.stdout

# -------------------------------------------------------------
# 5. Installation du plugin CLI CloudNativePG (cnpg)
# -------------------------------------------------------------
- name: Get latest CloudNativePG CLI release metadata
  ansible.builtin.uri:
    url: https://api.github.com/repos/cloudnative-pg/cloudnative-pg/releases/latest
    return_content: true
  register: cnpg_latest_release

- name: Set cnpg version fact
  ansible.builtin.set_fact:
    cnpg_version: "{{ (cnpg_latest_release.content | from_json).tag_name | replace('v', '') }}"

- name: Download cnpg plugin binary
  ansible.builtin.get_url:
    url: "https://github.com/cloudnative-pg/cloudnative-pg/releases/download/v{{ cnpg_version }}/cnpg_{{ cnpg_version }}_linux_amd64.tar.gz"
    dest: "/tmp/cnpg_{{ cnpg_version }}_linux_amd64.tar.gz"
    mode: '0644'

- name: Extract cnpg binary to /usr/local/bin
  ansible.builtin.unarchive:
    src: "/tmp/cnpg_{{ cnpg_version }}_linux_amd64.tar.gz"
    dest: "/usr/local/bin/"
    remote_src: true
    creates: "/usr/local/bin/kubectl-cnpg"
    exclude:
      - LICENSE
      - README.md
  become: true

- name: Ensure correct permissions for kubectl integration
  ansible.builtin.file:
    path: /usr/local/bin/kubectl-cnpg
    mode: '0755'
    owner: root
    group: root
  become: true

- name: Clean up tar.gz download
  ansible.builtin.file:
    path: "/tmp/cnpg_{{ cnpg_version }}_linux_amd64.tar.gz"
    state: absent