- name: Install K3s
  shell: |
    curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s

- name: Wait for node ready
  shell: /usr/local/bin/kubectl get nodes
  retries: 10
  delay: 10
  register: result
  until: result.rc == 0
  changed_when: false

- name: Clean up previous helm installations
  file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /usr/local/bin/helm
    - /tmp/linux-amd64
    - /tmp/helm.tar.gz
  become: true

- name: Download and unzip Helm
  unarchive:
    src: https://get.helm.sh/helm-v3.14.0-linux-amd64.tar.gz
    dest: /tmp/
    remote_src: yes
    creates: /usr/local/bin/helm

- name: Move helm binaries
  copy:
    src: /tmp/linux-amd64/helm
    dest: /usr/local/bin/helm
    mode: '0755'
    remote_src: yes
  become: true

- name: Clean tmp folder
  file:
    path: /tmp/linux-amd64
    state: absent

