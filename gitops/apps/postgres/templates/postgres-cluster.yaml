apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-cluster
  namespace: postgres
spec:
  instances: 3

  #imageName: public.ecr.aws/docker/library/postgres:16.4

  # 1. Configuration du stockage AWS gp3
  storage:
    size: 10Gi
    storageClass: "gp3" # Assurez-vous que la StorageClass gp3 est bien déployée via Terraform/K3s

  bootstrap:
    initdb:
      database: devdb
      owner: postgres

  postgresql:
    parameters:
      shared_buffers: "1GB"
      work_mem: "32MB"
      max_connections: "200"

  # 2. Configuration du Backup via IAM Instance Profile
  backup:
    barmanObjectStore:
      destinationPath: "s3://mon-postgres-backup-s3/" # Remplacez par votre vrai nom de bucket
      region: "us-east-2" # Remplacez par votre région AWS (ex: eu-west-3)
      
      # SRE : Plus de s3Credentials ! On dit à l'opérateur d'utiliser le rôle de l'EC2
      serverSideEncryption: "AES256"

      # Configuration des WAL (Write-Ahead Logs)
      wal:
        compression: gzip
        encryption: AES256

      # Stratégie de rétention
      retentionPolicy: "30d"

  monitoring:
    enablePodMonitor: true